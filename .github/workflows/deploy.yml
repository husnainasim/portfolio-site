name: CI / Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Optional: run lint/tests/build steps here
      # - name: Run tests
      #   run: |
      #     npm ci
      #     npm test

      - name: Deploy to Vercel (Preview on PRs, Production on main)
        uses: amondnet/vercel-action@v20 # popular vercel action
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod'            # remove for preview-only; conditionalize if you want previews for PRs
          working-directory: '.'           # change if your site is in a subfolder
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
