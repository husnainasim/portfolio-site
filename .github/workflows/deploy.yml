name: CI / Deploy to Vercel

on:
  push:
    branches:
      - production
  pull_request:
    branches:
      - '**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show failing commit author (debug)
        run: |
          echo "Commit SHA: $GITHUB_SHA"
          git --no-pager show -s --format='%an <%ae>' $GITHUB_SHA

      # Optional: run lint/build steps here
      # - name: Install / Test
      #   run: |
      #     npm ci
      #     npm test

      - name: Deploy to Vercel — Production (team-scoped)
        if: github.ref == 'refs/heads/production'
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_SCOPE }}        # <-- important: team ID
          vercel-args: '--prod'
          working-directory: '.'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel — Preview (team-scoped)
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/production'
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_SCOPE }}
          working-directory: '.'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
