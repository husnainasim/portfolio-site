name: CI / Deploy to Vercel

on:
  push:
    branches:
      - production
  pull_request:
    branches:
      - '**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Optional: run tests or build steps here
      # - name: Install / Test
      #   run: |
      #     npm ci
      #     npm test

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/production'
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          # either of these is accepted by the action - set your team/org id
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          # or: scope: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/production'
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # no --prod so this creates a preview deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
