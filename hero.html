<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Husnain's Portfolio</title>
    <style>
      /* Core tokens from proto */
      :root {
        --bg: rgb(0, 0, 0);
        --text: rgb(255, 255, 255);
        --text-muted: rgb(128, 128, 128);
        --line: rgb(22, 22, 22);
        --tile: rgb(10, 10, 10);
        --green: rgb(20, 199, 0);
        --blue: rgb(0, 157, 255);
      }

      /* Fonts (Clash Display + Inter via system fallbacks) */
      @font-face {
        font-family: "Clash Display";
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url("https://framerusercontent.com/third-party-assets/fontshare/wf/FPDAZ2S6SW4QMSRIIKNNGTPM6VIXYMKO/5HNPQ453FRLIQWV2FNOBUU3FKTDZQVSG/Z3MGHFHX6DCTLQ55LJYRJ5MDCZPMFZU6.woff2")
          format("woff2");
      }
      :root {
        --display-font: "Clash Display", system-ui, -apple-system, Segoe UI,
          Roboto, sans-serif;
      }
      :root {
        --ui-font: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
      }
      * {
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .container {
        max-width: 1480px;
        margin: 0 auto;
        padding: 0 30px;
      }

      /* Top nav */
      .nav {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        height: 90px;
      }
      .nav-left {
        font-family: var(--display-font);
        font-size: 18px;
        color: rgba(255, 255, 255, 0.6);
        text-transform: uppercase;
        letter-spacing: 0;
      }
      .nav-left strong {
        color: var(--text);
        font-weight: 600;
      }
      .nav-center {
        display: grid;
        grid-template-columns: repeat(2, 4px);
        grid-template-rows: repeat(2, 4px);
        gap: 6px;
        justify-content: center;
        align-content: center;
      }
      .dot {
        width: 4px;
        height: 4px;
        background: var(--text);
        border-radius: 50%;
      }
      .nav-right {
        display: flex;
        justify-content: flex-end;
      }
      .btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 24px;
        border-radius: 999px;
        text-decoration: none;
        color: var(--text);
        font-family: var(--display-font);
        font-size: 14px;
        border: 2px solid var(--text);
      }
      .btn::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: var(--bg);
        transform: translateY(20px);
        height: 20px;
        z-index: -1;
      }

      /* Hero */
      .hero {
        position: relative;
      }
      .hero-grid {
        position: relative;
        padding-bottom: 60px;
      }
      /* Grid lines */
      .hero-grid::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
            to right,
            transparent 24.9%,
            rgba(22, 22, 22, 0.25) 25%,
            transparent 25.1%,
            transparent 49.9%,
            rgba(22, 22, 22, 0.25) 50%,
            transparent 50.1%
          ),
          linear-gradient(
            to bottom,
            transparent 24.9%,
            rgba(22, 22, 22, 0.25) 25%,
            transparent 25.1%,
            transparent 49.9%,
            rgba(22, 22, 22, 0.25) 50%,
            transparent 50.1%
          );
        pointer-events: none;
      }
      /* Carbon pattern overlay */
      .hero-grid::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("proto/framerusercontent.com/images/ldf53R2pKtKErtQpdz1GxxWt2I.svg");
        background-size: 12.8px auto;
        background-repeat: repeat;
        opacity: 0.06;
        pointer-events: none;
      }

      .title-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .title {
        font-family: var(--display-font);
        /* text-transform: uppercase; */
        letter-spacing: 0;
        line-height: 0.8;
        font-weight: 600;
        font-size: clamp(20px, 25vw, 720px);
        margin: 0;
        text-align: center;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 40px;
        align-items: center;
        justify-items: center;
        padding: 40px 0 80px;
      }
      .meta-item {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        text-align: center;
      }
      .meta-left,
      .meta-right {
        align-items: center;
        text-align: center;
      }
      .label {
        font-family: var(--display-font);
        font-size: 12px;
        line-height: 12px;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        color: var(--text);
      }
      .sub {
        font-family: var(--display-font);
        font-size: 12px;
        line-height: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      .pin {
        width: 14px;
        height: 14px;
        color: var(--green);
      }
      .globe {
        width: 14px;
        height: 14px;
        color: var(--text);
      }
      .star {
        width: 14px;
        height: 14px;
        color: var(--blue);
      }

      /* Responsive */
      @media (max-width: 1199px) {
        .meta {
          grid-template-columns: 1fr;
          gap: 24px;
        }
        .meta-left,
        .meta-right {
          align-items: center;
          text-align: center;
        }
        .nav {
          grid-template-columns: 1fr auto auto;
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header class="container nav" aria-label="Site navigation">
      <div class="nav-left">LOCAL/ <strong id="clock">00:00:00</strong></div>
      <div class="nav-center" aria-hidden="true">
        <span class="dot"></span><span class="dot"></span>
        <span class="dot"></span><span class="dot"></span>
      </div>
      <div class="nav-right">
        <a class="btn" href="#contact">CONTACT NOW</a>
      </div>
    </header>

    <main class="hero">
      <section class="container hero-grid" aria-label="Hero">
        <div class="title-wrap" style="padding: 40px 0 0">
          <h1 class="title">Seni.</h1>
        </div>

        <div class="meta">
          <div class="meta-item meta-left">
            <svg
              class="pin"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M21 10.5C21 16 12 22 12 22S3 16 3 10.5a9 9 0 1 1 18 0Z"
              />
              <circle cx="12" cy="10.5" r="3" />
            </svg>
            <div class="label">BASED IN LOS ANGELES,</div>
            <div class="sub">CALIFORNIA</div>
          </div>

          <div class="meta-item">
            <svg
              class="globe"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="10" />
              <path
                d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10Z"
              />
            </svg>
            <div class="label">AVAILABLE ALL AROUND</div>
            <div class="sub">WORLDWIDE</div>
          </div>

          <div class="meta-item meta-right">
            <svg
              class="star"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M12 2l2.4 6.6L21 9l-5 3.7L17.5 19 12 15.8 6.5 19 8 12.7 3 9l6.6-.4L12 2z"
              />
            </svg>
            <div class="label">DIGITAL DESIGNER</div>
            <div class="sub">+ FRAMER DEVELOPER</div>
          </div>
        </div>
      </section>
    </main>

    <script>
      // Simple local clock
      function updateClock() {
        const el = document.getElementById("clock");
        if (!el) return;
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        const ss = String(now.getSeconds()).padStart(2, "0");
        el.textContent = `${hh}:${mm}:${ss}`;
      }
      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
